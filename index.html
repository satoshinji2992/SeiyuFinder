<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你长得最像哪个声优？</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "Helvetica Neue", sans-serif;
  background: #0f0f1a;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
h1 {
  margin-top: 40px;
  font-size: 28px;
  font-weight: 600;
  background: linear-gradient(135deg, #ff6b9d, #c44dff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle { color: #888; margin: 8px 0 30px; font-size: 14px; }
#dropzone {
  width: 90%; max-width: 500px;
  border: 2px dashed #333;
  border-radius: 16px;
  padding: 60px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  background: #1a1a2e;
}
#dropzone:hover, #dropzone.dragover {
  border-color: #c44dff;
  background: #1e1e36;
}
#dropzone .icon { font-size: 48px; margin-bottom: 12px; }
#dropzone p { color: #888; font-size: 15px; }
#dropzone p span { color: #c44dff; text-decoration: underline; }
#preview {
  display: none;
  width: 90%; max-width: 500px;
  margin-top: 20px;
  border-radius: 12px;
  overflow: hidden;
}
#preview img {
  width: 100%;
  display: block;
  border-radius: 12px;
}
#loading {
  display: none;
  margin-top: 30px;
  text-align: center;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid #333;
  border-top-color: #c44dff;
  border-radius: 50%;
  margin: 0 auto 12px;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#results {
  display: none;
  width: 90%; max-width: 600px;
  margin-top: 30px;
}
.result-card {
  background: #1a1a2e;
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 20px;
  border: 1px solid #2a2a40;
  animation: fadeIn 0.4s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }
.result-card .face-num {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #ff6b9d, #c44dff);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 16px;
  flex-shrink: 0;
}
.result-card .match-avatar {
  width: 80px; height: 80px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #c44dff;
  flex-shrink: 0;
}
.result-card .info { flex: 1; }
.result-card .label { font-size: 13px; color: #666; margin-bottom: 4px; }
.result-card .name {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, #ff6b9d, #c44dff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
#retry {
  display: none;
  margin: 24px 0 40px;
  padding: 12px 32px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(135deg, #ff6b9d, #c44dff);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.3s;
}
#retry:hover { opacity: 0.85; }
</style>
</head>
<body>
<h1>你长得最像哪个声优？</h1>
<p class="subtitle">上传一张照片，看看你最像谁</p>
<div id="dropzone" onclick="document.getElementById('fileInput').click()">
  <div class="icon">📷</div>
  <p>拖拽图片到这里，或者 <span>点击上传</span></p>
  <input type="file" id="fileInput" accept="image/*" style="display:none">
</div>
<div id="preview"><img id="previewImg"></div>
<div id="loading">
  <div class="spinner"></div>
  <p>正在识别中...</p>
</div>
<div id="results"></div>
<button id="retry" onclick="resetAll()">再来一张</button>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const previewImg = document.getElementById('previewImg');
const loading = document.getElementById('loading');
const results = document.getElementById('results');
const retry = document.getElementById('retry');

dropzone.addEventListener('dragover', e => {
  e.preventDefault();
  dropzone.classList.add('dragover');
});
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

function handleFile(file) {
  if (!file.type.startsWith('image/')) return;
  previewImg.src = URL.createObjectURL(file);
  preview.style.display = 'block';
  dropzone.style.display = 'none';

  loading.style.display = 'block';
  results.style.display = 'none';
  retry.style.display = 'none';

  const reader = new FileReader();
  reader.onload = () => {
    const apiBase = '//' + location.host;
    fetch(apiBase, { method: 'POST', body: reader.result })
      .then(r => r.json())
      .then(data => showResults(data.faces))
      .catch(err => {
        loading.style.display = 'none';
        results.style.display = 'block';
        results.innerHTML = '<p style="color:#ff6b9d;text-align:center">识别失败，请重试</p>';
        retry.style.display = 'inline-block';
      });
  };
  reader.readAsArrayBuffer(file);
}

function showResults(faces) {
  loading.style.display = 'none';
  results.style.display = 'block';
  retry.style.display = 'inline-block';
  results.innerHTML = '';
  faces.forEach((name, i) => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="face-num">${i + 1}</div>
      <img class="match-avatar" src="/avatar/${encodeURIComponent(name)}" alt="${name}">
      <div class="info">
        <div class="label">${faces.length > 1 ? '第 ' + (i+1) + ' 张脸' : ''} 最像</div>
        <div class="name">${name}</div>
      </div>
    `;
    results.appendChild(card);
  });
}

function resetAll() {
  dropzone.style.display = 'block';
  preview.style.display = 'none';
  loading.style.display = 'none';
  results.style.display = 'none';
  retry.style.display = 'none';
  fileInput.value = '';
}
</script>
</body>
</html>
