upstream seiyuumatch_workers {
    least_conn;
    server 127.0.0.1:3724 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:3725 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

server {
    listen 127.0.0.1:8080;
    server_name _;
    root /root/SeiyuuMatch;

    client_max_body_size 90m;

    location /icon/ {
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri.png $uri.jpg $uri.jpeg $uri.webp @app;
    }

    location /avatar/ {
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri/1.jpg $uri/1.jpeg $uri/1.png $uri/1.webp @app;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_pass http://seiyuumatch_workers;
    }

    location @app {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_pass http://seiyuumatch_workers;
    }
}
